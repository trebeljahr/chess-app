services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "3515:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3514}:3514"
    environment:
      PORT: "3514"
      HOST: "0.0.0.0"
      NODE_ENV: "${NODE_ENV:-production}"
      REDIS_URL: redis://redis:6379
      CHESS_DB_FILE: /app/data/chess.db
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - chess-data:/app/data

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    environment:
      PORT: "80"
      BACKEND_URL: http://server:3514
    depends_on:
      - server

volumes:
  chess-data:
