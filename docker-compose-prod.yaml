services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: ghcr.io/trebeljahr/chess-app-server:latest
    restart: unless-stopped
    environment:
      PORT: "3514"
      HOST: "0.0.0.0"
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      CHESS_DB_FILE: /app/data/chess.db
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - chess-data:/app/data

  client:
    image: ghcr.io/trebeljahr/chess-app-client:latest
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      PORT: "80"
      BACKEND_URL: http://server:3514
    depends_on:
      - server

volumes:
  chess-data:
